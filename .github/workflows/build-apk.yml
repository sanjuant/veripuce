name: Build APK

on:
  push:
    branches:
      - '**'   # sur les branches uniquement ; les tags v* déclenchent release.yml
  workflow_dispatch:   # permet aussi de lancer le build à la main depuis l'onglet Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: SDK Android
        uses: android-actions/setup-android@v4

      # Fournit le cache Gradle. La version de Gradle est pinnée par le wrapper
      # (gradle/wrapper/gradle-wrapper.properties -> 8.14.3), pas ici.
      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Publier l'APK
        uses: actions/upload-artifact@v6
        with:
          name: veridoc-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
