name: Release

on:
  push:
    tags:
      - 'v*'   # ex. v1.0.0 -> build signé + GitHub Release

permissions:
  contents: write   # requis pour créer la GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: SDK Android
        uses: android-actions/setup-android@v3

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Décoder le keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/veridoc-release.jks"

      - name: Build release signé
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/veridoc-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_CODE: ${{ github.run_number }}
        run: |
          export VERSION_NAME="${GITHUB_REF_NAME#v}"   # v1.0.0 -> 1.0.0
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Renommer l'APK avec la version
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/veridoc-release.apk "dist/veridoc-${GITHUB_REF_NAME}.apk"

      - name: Créer la GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/veridoc-*.apk
          generate_release_notes: true
